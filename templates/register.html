{% extends 'base.html' %}

{% block title %}Register - AdFlow{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-lg border shadow-sm">
        <div class="p-6 space-y-1">
            <h2 class="text-2xl font-bold">Create an account</h2>
            <p class="text-gray-500">Enter your information to get started with AdFlow</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="p-6 pt-0 space-y-4">
            <div class="space-y-2">
                <label for="name" class="text-sm font-medium">Full Name</label>
                <input id="name" name="name" placeholder="John Doe" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium">Email</label>
                <input id="email" name="email" type="email" placeholder="name@example.com" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-sm font-medium">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="space-y-2">
                <label for="confirm_password" class="text-sm font-medium">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <button type="submit" class="w-full py-2 px-4 primary-bg text-white font-medium rounded-md hover:bg-blue-700">
                Create account
            </button>
            <div class="text-center text-sm">
                Already have an account?
                <a href="{{ url_for('login') }}" class="primary-color hover:underline">
                    Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
